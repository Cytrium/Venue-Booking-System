<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Azure Horizon | Staff Portal Login</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "primary-fixed": "#d8e2ff",
                    "on-tertiary-container": "#0e0200",
                    "error-container": "#ffdad6",
                    "on-secondary": "#ffffff",
                    "on-primary-fixed-variant": "#004493",
                    "on-secondary-container": "#3d5481",
                    "primary-container": "#1a73e8",
                    "surface-container-low": "#f2f4f6",
                    "surface-dim": "#d8dadc",
                    "on-surface": "#191c1e",
                    "tertiary-container": "#c55500",
                    "error": "#ba1a1a",
                    "on-secondary-fixed-variant": "#2e4673",
                    "on-error-container": "#93000a",
                    "surface-container": "#eceef0",
                    "surface-tint": "#005bc0",
                    "inverse-primary": "#adc7ff",
                    "outline": "#727785",
                    "tertiary": "#9e4300",
                    "on-primary-container": "#ffffff",
                    "on-tertiary-fixed": "#341100",
                    "secondary-fixed": "#d8e2ff",
                    "on-tertiary": "#ffffff",
                    "surface-container-highest": "#e0e3e5",
                    "on-tertiary-fixed-variant": "#783100",
                    "secondary-container": "#b2c9fe",
                    "on-primary": "#ffffff",
                    "primary": "#005bbf",
                    "outline-variant": "#c1c6d6",
                    "background": "#f7f9fb",
                    "inverse-surface": "#2d3133",
                    "secondary-fixed-dim": "#afc7fb",
                    "surface": "#f7f9fb",
                    "surface-bright": "#f7f9fb",
                    "on-surface-variant": "#414754",
                    "inverse-on-surface": "#eff1f3",
                    "primary-fixed-dim": "#adc7ff",
                    "tertiary-fixed-dim": "#ffb691",
                    "on-background": "#191c1e",
                    "surface-container-high": "#e6e8ea",
                    "on-error": "#ffffff",
                    "secondary": "#475e8c",
                    "tertiary-fixed": "#ffdbcb",
                    "on-primary-fixed": "#001a41",
                    "on-secondary-fixed": "#001a41",
                    "surface-container-lowest": "#ffffff",
                    "surface-variant": "#e0e3e5"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Manrope"],
                    "body": ["Manrope"],
                    "label": ["Manrope"]
            }
          },
        },
      }
    </script>
<style>
        body { font-family: 'Manrope', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }
    </style>
</head>
<body class="bg-surface-bright text-on-surface min-h-screen flex flex-col relative overflow-hidden">
<!-- Background Decorative Elements -->
<div class="absolute inset-0 z-0 overflow-hidden pointer-events-none">
<div class="absolute -top-[10%] -left-[10%] w-[40%] h-[40%] bg-primary/5 rounded-full blur-[120px]"></div>
<div class="absolute -bottom-[10%] -right-[10%] w-[30%] h-[30%] bg-secondary/5 rounded-full blur-[100px]"></div>
<img class="absolute inset-0 w-full h-full object-cover opacity-10 filter grayscale" data-alt="Modern high-end office lobby with floor-to-ceiling glass windows and clean architectural lines in soft daylight" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBAYv0nwgONyhombHZhJFwTkxZ6lUrUH7Qx_LhWEDpkY8r5dNoKF7GFqxQ8fcEhod4v4b8H1CxTfUwjA0iLEzPywuRp3PqTx8Wt207gZIj0cYELazdLuS-7nGHPu5uQdtU2RaGYMlnNCR_gSPHNh6PbzEtxttTvgK0Sap-pXfhuvMaRgJ1F0rigcOGUy5IYoePchjOXSy3TCUI7_bAwZeK9BIe9S5uUpGLc4caPegnXqodLA561Yxaj06pb_60knv14C2_3K-7GgBA"/>
</div>
<!-- Main Content Canvas -->
<main class="flex-grow flex items-center justify-center p-6 z-10">
<div class="w-full max-w-[440px] animate-fade-in">
<!-- Brand Identity Section -->
<div class="text-center mb-10">
<div class="inline-flex items-center justify-center w-16 h-16 bg-gradient-to-br from-primary to-primary-container rounded-xl shadow-lg mb-6">
<span class="material-symbols-outlined text-white text-3xl" data-icon="domain">domain</span>
</div>
<h1 class="text-2xl font-extrabold tracking-tight text-on-surface mb-2">Azure Horizon Management</h1>
<p class="text-on-surface-variant font-medium text-sm">Official Staff Administration Portal</p>
</div>
<!-- Login Card -->
<div class="surface-container-lowest glass-panel rounded-xl shadow-[0px_12px_32px_rgba(25,28,30,0.06)] p-8 md:p-10 border border-white/40">
<form class="space-y-6">
<!-- Input Group: Employee ID -->
<div class="space-y-2">
<label class="block text-xs font-bold uppercase tracking-wider text-on-surface-variant ml-1" for="employee-id">
                            Employee ID/Email
                        </label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-[20px]" data-icon="badge">badge</span>
</div>
<input class="block w-full pl-11 pr-4 py-3.5 bg-surface-container-low border-none rounded-lg text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/20 transition-all text-sm font-medium" id="employee-id" name="employee-id" placeholder="e.g. staff.name@azurehorizon.com" type="text"/>
</div>
</div>
<!-- Input Group: Password -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="block text-xs font-bold uppercase tracking-wider text-on-surface-variant" for="password">
                                Password
                            </label>
<a class="text-xs font-semibold text-primary hover:text-primary-container transition-colors" href="#">
                                Forgot password?
                            </a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-[20px]" data-icon="lock">lock</span>
</div>
<input class="block w-full pl-11 pr-12 py-3.5 bg-surface-container-low border-none rounded-lg text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/20 transition-all text-sm font-medium" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute inset-y-0 right-0 pr-4 flex items-center text-outline hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Security Checkbox -->
<div class="flex items-center space-x-2 px-1">
<input class="w-4 h-4 rounded border-outline-variant text-primary focus:ring-primary bg-surface-container-low transition-all" id="remember" type="checkbox"/>
<label class="text-sm font-medium text-on-surface-variant cursor-pointer" for="remember">Keep me signed in for 24 hours</label>
</div>
<!-- Action Button -->
<button class="w-full py-4 bg-gradient-to-r from-primary to-primary-container text-white font-bold rounded-lg shadow-md hover:shadow-xl active:scale-[0.98] transition-all flex items-center justify-center space-x-2 group" type="submit">
<span>Authenticate &amp; Access</span>
<span class="material-symbols-outlined group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Help & Footer inside card -->
<div class="mt-8 pt-8 border-t border-surface-container-high flex flex-col items-center space-y-4">
<div class="flex items-center space-x-2 px-4 py-2 bg-surface-container-low rounded-full">
<span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
<span class="text-[10px] font-bold text-on-surface-variant uppercase tracking-widest">Secure Server Status: Active</span>
</div>
</div>
</div>
<!-- Global Footer Links -->
<footer class="mt-8 text-center space-y-4">
<p class="text-xs text-outline font-medium">
                    © 2024 Azure Horizon Venue Booking. All rights reserved.
                </p>
<div class="flex justify-center space-x-6 text-xs font-semibold text-on-surface-variant">
<a class="hover:text-primary transition-colors" href="#">Security Policy</a>
<a class="hover:text-primary transition-colors" href="#">IT Support</a>
<a class="hover:text-primary transition-colors" href="#">Global Offices</a>
</div>
</footer>
</div>
</main>
<!-- Overlay Alert (Simulated for high-contrast feel) -->
<div class="fixed top-6 right-6 flex items-center space-x-3 bg-white/90 backdrop-blur-md px-4 py-3 rounded-lg shadow-lg border-l-4 border-primary z-50">
<span class="material-symbols-outlined text-primary" data-icon="info" data-weight="fill" style="font-variation-settings: 'FILL' 1;">info</span>
<div class="flex flex-col">
<span class="text-xs font-bold text-on-surface">Staff Notice</span>
<span class="text-[10px] text-on-surface-variant font-medium">Monthly security rotation scheduled for Sunday.</span>
</div>
</div>
</body></html>
